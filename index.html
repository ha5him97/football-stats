<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football Stats & Analysis Hub</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

</head>
<body>

  <header class="bg-info text-white text-center py-4">
    <h1 class="font-weight-bold">Football Stats </h1>
    <p class="font-italic">Thank you to visit my website!</p>
    <!-- public/index.html -->
<nav>
    <a href="players/players.html" class="button text-primary">Player Stats</a>
  </nav><nav>
    <a href="ucl/ucl.html" class="button text-danger">UCL Table</a>
  </nav>
  <nav>
    <a href="top-ten/home.html" class="button text-warning">Top Ten Young Players</a>
  </nav>

  <div class="container mt-5">
    <section id="featured-matches" class="my-5">
      <div class="row" id="matches-container">
        <div id="match-list">
          <h2>Upcoming Matches</h2>
          <ul id="matches">
            <!-- Matches will be listed here -->
            <div id="pagination-controls">
              <button id="prev-btn">Previous</button>
              <button id="next-btn">Next</button>
              <input type="text" id="team-filter" placeholder="Filter by Team">
              <button onclick="filterMatches()">Filter</button>

            </div>
            
          </ul>
        </div>
        
      </div>
    </section>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="js/scripts.js"></script>
